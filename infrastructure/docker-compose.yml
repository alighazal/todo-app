version: "3.9"

services:
  backend:
    build:
      context: ../backend
    container_name: todo-backend
    env_file:
      - ./env/backend.env
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
    container_name: todo-frontend
    env_file:
      - ./env/frontend.env
    depends_on:
      - backend
    ports:
      - "3000:3000"

  db:
    image: postgres:16
    container_name: todo-db
    env_file:
      - ./env/db.env
    ports:
      - "5432:5432"
    volumes:
      - todo-postgres-data:/var/lib/postgresql/data

volumes:
  todo-postgres-data:

